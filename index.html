<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тестирование: ПМ 04</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --correct: #34c759;
            --wrong: #ff3b30;
            --hint-color: #ff9500;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.06);
            --border-radius: 24px;
            --select-bg: #f5f5f7;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: #1c1c1e;
                --text-main: #f5f5f7;
                --text-secondary: #a1a1a6;
                --card-shadow: 0 10px 30px rgba(0,0,0,0.5);
                --select-bg: #2c2c2e;
            }
            body { background-color: var(--bg-color); }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 480px;
            position: relative;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            padding: 32px 24px;
            display: none;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .card.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 { margin: 0; font-weight: 700; text-align: center; font-size: 24px; letter-spacing: -0.5px; }
        p.subtitle { color: var(--text-secondary); text-align: center; margin: 0; font-size: 15px; line-height: 1.5; }

        /* Селектор диапазона */
        .range-container { display: flex; flex-direction: column; gap: 10px; margin: 8px 0; }
        .range-option {
            display: flex; align-items: center; background: var(--select-bg);
            padding: 16px; border-radius: 16px; cursor: pointer;
            transition: all 0.2s ease; border: 2px solid transparent;
        }
        .range-option input[type="radio"] {
            appearance: none; -webkit-appearance: none;
            width: 20px; height: 20px; border: 2px solid var(--text-secondary);
            border-radius: 50%; margin-right: 14px; outline: none;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; background: transparent;
        }
        .range-option input[type="radio"]:checked {
            border-color: var(--accent); background: var(--accent);
        }
        .range-option input[type="radio"]:checked::before {
            content: ""; width: 8px; height: 8px; background: #ffffff; border-radius: 50%;
        }
        .range-option:has(input:checked) {
            border-color: rgba(0, 113, 227, 0.3); background: rgba(0, 113, 227, 0.05);
        }
        .range-label { font-size: 16px; font-weight: 600; }

        /* Прогресс и кнопки */
        .progress-bar { height: 6px; background: rgba(134, 134, 139, 0.2); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }
        .question-text { font-size: 20px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; text-align: center; }
        
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            background: rgba(134, 134, 139, 0.1); border: 2px solid transparent; border-radius: 16px;
            padding: 16px 20px; font-size: 16px; font-family: inherit; color: var(--text-main);
            text-align: left; cursor: pointer; transition: all 0.2s ease;
            position: relative; font-weight: 500; line-height: 1.3;
        }
        .option-btn:hover:not(:disabled) { background: rgba(134, 134, 139, 0.15); }
        .option-btn:active:not(:disabled) { transform: scale(0.98); }
        
        .option-btn.correct { background: rgba(52, 199, 89, 0.15); border-color: var(--correct); color: var(--correct); }
        .option-btn.wrong { background: rgba(255, 59, 48, 0.15); border-color: var(--wrong); color: var(--wrong); }
        
        /* Стили для подсказки */
        .option-btn.hidden-by-hint {
            opacity: 0.3; pointer-events: none; transform: scale(0.95);
        }

        .actions-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 5px; }
        
        .primary-btn {
            background: var(--accent); color: white; border: none; border-radius: 16px;
            padding: 16px; font-size: 17px; font-weight: 600; cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease; width: 100%; letter-spacing: -0.3px;
        }
        .primary-btn:hover { background: var(--accent-hover); }
        .primary-btn:active { transform: scale(0.98); }

        .hint-btn {
            background: rgba(255, 149, 0, 0.15); color: var(--hint-color); border: none; border-radius: 16px;
            padding: 12px 16px; font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; flex-shrink: 0;
        }
        .hint-btn:hover:not(:disabled) { background: rgba(255, 149, 0, 0.25); }
        .hint-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .result-percent { font-size: 64px; font-weight: 800; color: var(--text-main); text-align: center; margin: 10px 0 0 0; letter-spacing: -2px;}
        .result-score { font-size: 18px; font-weight: 600; color: var(--accent); text-align: center; margin: 0 0 10px 0; }
        .stats { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-secondary); font-weight: 500; }
    </style>
</head>

<div class="container">
    <!-- ГЛАВНАЯ СТРАНИЦА -->
    <div id="intro-screen" class="card active">

        <p class="subtitle">118 уникальных вопросов. Выберите диапазон:</p>

        <button class="primary-btn" onclick="startQuiz()">Начать тест</button>

    <!-- ЭКРАН ТЕСТИРОВАНИЯ -->
    <div id="quiz-screen" class="card">

        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="question-text" id="question-text"></div>
        <div class="options" id="options-container"></div>
        
        <div class="actions-row">

        </div>
    </div>

    <!-- ЭКРАН РЕЗУЛЬТАТОВ -->
    <div id="result-screen" class="card">
        <h1>Тест завершен</h1>
        <p class="subtitle">Ваш итоговый результат:</p>
        <div class="result-percent" id="final-percent">0%</div>
        <div class="result-score" id="final-score">0 из 0 правильных</div>
        <p class="subtitle" id="result-message"></p>
        <button class="primary-btn" onclick="backToIntro()">На главную</button>
    </div>
</div>

    let currentPool = [];
    let currentQIndex = 0;
    let score = 0;
    let isAnswering = false;
    let currentCorrectAnswer = "";

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startQuiz() {
        const rangeValue = document.querySelector('input[name="quiz-range"]:checked').value;
        
        if (rangeValue === '1-50') currentPool = allQuestions.slice(0, 50);
        else if (rangeValue === '51-118') currentPool = allQuestions.slice(50, 118);
        else currentPool = [...allQuestions];

        shuffle(currentPool);
        
        currentQIndex = 0;
        score = 0;
        switchScreen('quiz-screen');
        loadQuestion();
    }

    function loadQuestion() {
        isAnswering = false;
        const q = currentPool[currentQIndex];
        currentCorrectAnswer = q.correct;
        
        // Сброс кнопки подсказки
        const hintBtn = document.getElementById('hint-btn');
        hintBtn.disabled = false;
        hintBtn.innerText = "💡 50/50";
        
        document.getElementById('question-counter').innerText = `Вопрос ${currentQIndex + 1} из ${currentPool.length}`;
        document.getElementById('score-counter').innerText = `Счет: ${score}`;
        document.getElementById('progress').style.width = `${(currentQIndex / currentPool.length) * 100}%`;
        document.getElementById('question-text').innerText = q.question;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        let options = [...q.options];
        shuffle(options);
        
        options.forEach(optText => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = optText;
            btn.dataset.text = optText;
            btn.onclick = () => handleAnswer(optText, q.correct, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function useHint() {
        if (isAnswering) return;
        
        const hintBtn = document.getElementById('hint-btn');
        hintBtn.disabled = true;
        
        const allBtns = Array.from(document.querySelectorAll('.option-btn'));
        const wrongBtns = allBtns.filter(b => b.dataset.text !== currentCorrectAnswer);
        
        // Перемешиваем неправильные ответы
        shuffle(wrongBtns);
        
        // Прячем ровно 2 неправильных ответа
        if (wrongBtns.length >= 2) {
            wrongBtns[0].classList.add('hidden-by-hint');
            wrongBtns[1].classList.add('hidden-by-hint');
        }
    }

    function handleAnswer(selected, correct, btnElement) {
        if (isAnswering) return;
        isAnswering = true;
        
        document.getElementById('hint-btn').disabled = true;
        const allBtns = document.querySelectorAll('.option-btn');
        
        if (selected === correct) {
            btnElement.classList.add('correct');
            score++;
            document.getElementById('score-counter').innerText = `Счет: ${score}`;
        } else {
            btnElement.classList.add('wrong');
            allBtns.forEach(b => {
                if (b.dataset.text === correct) b.classList.add('correct');
            });
        }
        
        setTimeout(() => {
            currentQIndex++;
            if (currentQIndex < currentPool.length) loadQuestion();
            else showResults();
        }, 1200); 
    }

    function showResults() {
        switchScreen('result-screen');
        const percentage = Math.round((score / currentPool.length) * 100);
        
        document.getElementById('final-percent').innerText = `${percentage}%`;
        document.getElementById('final-score').innerText = `Правильно: ${score} из ${currentPool.length}`;
        document.getElementById('progress').style.width = `100%`;
        
        let msg = "Нужно еще потренироваться.";
        if (percentage >= 90) msg = "Превосходно! Прекрасный результат.";
        else if (percentage >= 70) msg = "Хороший результат, тест сдан!";
        else if (percentage >= 50) msg = "Неплохо, но лучше повторить материал.";
        
        document.getElementById('result-message').innerText = msg;
    }

    function backToIntro() {
        switchScreen('intro-screen');
    }
</script>
</body>
</html>
